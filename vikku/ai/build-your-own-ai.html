<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUILD YOUR OWN — AI/ML From Scratch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&family=Syne+Mono&display=swap');

:root {
  --bg: #080c10;
  --surface: #0d1117;
  --surface2: #161b22;
  --border: #21262d;
  --text: #e6edf3;
  --muted: #7d8590;
  --dim: #3d444d;

  --tier1: #f0c040;
  --tier2: #e07020;
  --tier3: #c03050;
  --tier4: #7040e0;

  --cat-inference: #3fb950;
  --cat-training: #ff7b72;
  --cat-arch: #79c0ff;
  --cat-systems: #ffa657;
  --cat-rag: #d2a8ff;
  --cat-multimodal: #56d364;
  --cat-optim: #f0883e;
  --cat-data: #58a6ff;

  --mono: 'Space Mono', monospace;
  --display: 'Syne', sans-serif;
  --code: 'Syne Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCANLINE TEXTURE */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* HEADER */
header {
  padding: 48px 40px 32px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

header::before {
  content: 'BUILD YOUR OWN';
  position: absolute;
  top: -20px;
  right: -20px;
  font-family: var(--display);
  font-size: 10rem;
  font-weight: 800;
  color: rgba(255,255,255,0.02);
  letter-spacing: -0.05em;
  pointer-events: none;
  white-space: nowrap;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
}

h1 {
  font-family: var(--display);
  font-size: clamp(2rem, 4vw, 3.5rem);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.02em;
}

h1 .accent { color: var(--tier1); }
h1 .dim { color: var(--muted); font-weight: 400; }

.header-meta {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  margin-top: 12px;
  text-transform: uppercase;
}

.stats-row {
  display: flex;
  gap: 24px;
  margin-top: 32px;
  flex-wrap: wrap;
}

.stat-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.stat-pill .n {
  font-family: var(--display);
  font-size: 1.2rem;
  font-weight: 800;
  line-height: 1;
}

/* TIER LEGEND */
.tier-legend {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.tier-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.tier-dot {
  width: 8px; height: 8px;
  border-radius: 1px;
}

/* CONTROLS */
.controls {
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  background: rgba(13,17,23,0.8);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.filter-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--dim); color: var(--text); }
.filter-btn.active { color: var(--bg); border-color: transparent; }

.filter-btn[data-cat="all"].active { background: var(--text); }
.filter-btn[data-cat="inference"].active { background: var(--cat-inference); }
.filter-btn[data-cat="training"].active { background: var(--cat-training); }
.filter-btn[data-cat="arch"].active { background: var(--cat-arch); }
.filter-btn[data-cat="systems"].active { background: var(--cat-systems); }
.filter-btn[data-cat="rag"].active { background: var(--cat-rag); color: #000; }
.filter-btn[data-cat="multimodal"].active { background: var(--cat-multimodal); }
.filter-btn[data-cat="optim"].active { background: var(--cat-optim); }
.filter-btn[data-cat="data"].active { background: var(--cat-data); }

.tier-filter-group {
  display: flex;
  gap: 6px;
}

.tier-btn {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.tier-btn:hover { color: var(--text); }
.tier-btn.active[data-tier="1"] { background: var(--tier1); color: #000; border-color: transparent; }
.tier-btn.active[data-tier="2"] { background: var(--tier2); color: #fff; border-color: transparent; }
.tier-btn.active[data-tier="3"] { background: var(--tier3); color: #fff; border-color: transparent; }
.tier-btn.active[data-tier="4"] { background: var(--tier4); color: #fff; border-color: transparent; }

.sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

.search-box {
  padding: 5px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.65rem;
  outline: none;
  border-radius: 2px;
  width: 200px;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--dim); }
.search-box::placeholder { color: var(--dim); }

/* GRID */
.grid-container {
  padding: 32px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 2px;
  background: var(--border);
}

.project-card {
  background: var(--surface);
  padding: 24px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  border-left: 3px solid transparent;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.project-card:hover { background: var(--surface2); }
.project-card.hidden { display: none; }
.project-card.done { opacity: 0.5; }
.project-card.done .card-title { text-decoration: line-through; }

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.card-num {
  font-size: 0.6rem;
  color: var(--dim);
  letter-spacing: 0.1em;
}

.card-badges {
  display: flex;
  gap: 5px;
  align-items: center;
}

.badge {
  padding: 2px 7px;
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 1px;
}

.tier-badge-1 { background: rgba(240,192,64,0.15); color: var(--tier1); border: 1px solid rgba(240,192,64,0.3); }
.tier-badge-2 { background: rgba(224,112,32,0.15); color: var(--tier2); border: 1px solid rgba(224,112,32,0.3); }
.tier-badge-3 { background: rgba(192,48,80,0.15); color: var(--tier3); border: 1px solid rgba(192,48,80,0.3); }
.tier-badge-4 { background: rgba(112,64,224,0.15); color: var(--tier4); border: 1px solid rgba(112,64,224,0.3); }

.cat-badge { font-size: 0.55rem; padding: 2px 7px; border-radius: 1px; }

.card-title {
  font-family: var(--display);
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
}

.card-tagline {
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.55;
}

.card-stack {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.stack-tag {
  padding: 2px 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  font-size: 0.55rem;
  color: var(--dim);
  border-radius: 1px;
  font-family: var(--code);
  letter-spacing: 0.05em;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

.card-time {
  font-size: 0.6rem;
  color: var(--dim);
  letter-spacing: 0.06em;
}

.card-deps {
  font-size: 0.55rem;
  color: var(--dim);
}

.done-btn {
  width: 18px; height: 18px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  color: var(--dim);
  border-radius: 2px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.done-btn:hover { border-color: #3fb950; color: #3fb950; }
.project-card.done .done-btn { background: rgba(63,185,80,0.15); border-color: #3fb950; color: #3fb950; }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,12,16,0.92);
  z-index: 1000;
  display: none;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  width: min(680px, 95vw);
  max-height: calc(100vh - 40px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow-y: auto;
  animation: slideIn 0.2s ease;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}

.modal-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 2px;
  flex-shrink: 0;
  transition: all 0.15s;
}
.modal-close:hover { border-color: var(--tier3); color: var(--tier3); }

.modal-body { padding: 28px; display: flex; flex-direction: column; gap: 24px; }

.modal-title {
  font-family: var(--display);
  font-size: 1.5rem;
  font-weight: 800;
  line-height: 1.2;
}

.modal-section-title {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
}

.guide-step {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.guide-step:last-child { border-bottom: none; }

.step-num {
  font-family: var(--display);
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--dim);
  min-width: 32px;
  line-height: 1;
  padding-top: 3px;
}

.step-content {}
.step-title {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
  font-family: var(--display);
}
.step-desc {
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.6;
}
.step-code {
  margin-top: 8px;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: var(--code);
  font-size: 0.68rem;
  color: var(--tier1);
  line-height: 1.6;
  white-space: pre-wrap;
  overflow-x: auto;
}

.resource-list { display: flex; flex-direction: column; gap: 6px; }
.resource-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: 2px;
}
.resource-type {
  font-size: 0.58rem;
  padding: 2px 6px;
  border-radius: 1px;
  font-family: var(--code);
  flex-shrink: 0;
  margin-top: 1px;
}
.rtype-paper { background: rgba(121,192,255,0.12); color: var(--cat-arch); }
.rtype-repo { background: rgba(63,185,80,0.12); color: var(--cat-inference); }
.rtype-video { background: rgba(255,123,114,0.12); color: var(--cat-training); }
.rtype-blog { background: rgba(210,168,255,0.12); color: var(--cat-rag); }
.rtype-docs { background: rgba(88,166,255,0.12); color: var(--cat-data); }

.resource-text {}
.resource-name { font-size: 0.75rem; color: var(--text); margin-bottom: 2px; }
.resource-detail { font-size: 0.6rem; color: var(--muted); }

.difficulty-bar {
  display: flex;
  gap: 3px;
  align-items: center;
}
.diff-seg {
  height: 6px;
  width: 28px;
  border-radius: 1px;
  background: var(--border);
}
.diff-seg.filled { background: var(--tier1); }

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.info-box {
  background: var(--surface2);
  padding: 12px 14px;
  border-radius: 2px;
}
.info-label {
  font-size: 0.58rem;
  color: var(--dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.info-val {
  font-size: 0.8rem;
  color: var(--text);
  font-family: var(--display);
  font-weight: 700;
}

/* PROGRESS BAR at bottom */
.progress-bar-container {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--border);
  z-index: 500;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--tier4), var(--tier3), var(--tier2), var(--tier1));
  transition: width 0.4s ease;
}

.count-label {
  position: fixed;
  bottom: 10px;
  right: 20px;
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  z-index: 501;
  background: var(--bg);
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
}

/* EMPTY STATE */
.empty-state {
  grid-column: 1/-1;
  padding: 80px;
  text-align: center;
  color: var(--dim);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  display: none;
}

@media (max-width: 600px) {
  header, .controls, .grid-container { padding-left: 16px; padding-right: 16px; }
  .grid-container { grid-template-columns: 1fr; }
  .modal { width: 100%; max-height: 85vh; position: fixed; bottom: 0; border-radius: 8px 8px 0 0; }
  .modal-overlay { align-items: flex-end; padding: 0; }
}
</style>
</head>

<!-- riop-ns -->
<script>
/*
 * Per-person localStorage namespacing.
 *
 * The trackers live at /<person>/<...>/<file>.html on a shared origin,
 * so without this every tracker key (e.g. 'am-done', 'dp-done') would
 * be shared across people. We rewrite getItem/setItem/removeItem to
 * prefix the person's folder name when it sees one of our known keys.
 */
(function () {
  var PEOPLE  = ['ihba7991', 'vikku'];
  var PERSON  = (location.pathname.split('/').filter(Boolean)
                 .find(function (s) { return PEOPLE.indexOf(s) !== -1; })) || 'default';
  var NS_KEYS = ['byodone', 'byo-be-done', 'byo-fafo-done',
                 'dp-done', 'mc-done', 'cc-done', 'am-done'];
  function ns(k) { return NS_KEYS.indexOf(k) !== -1 ? (PERSON + ':' + k) : k; }

  var proto = Storage.prototype;
  var oGet  = proto.getItem;
  var oSet  = proto.setItem;
  var oDel  = proto.removeItem;
  proto.getItem    = function (k)    { return oGet.call(this, ns(k)); };
  proto.setItem    = function (k, v) { return oSet.call(this, ns(k), v); };
  proto.removeItem = function (k)    { return oDel.call(this, ns(k)); };

  // One-time migration: any shared-key values become the person's values.
  try {
    NS_KEYS.forEach(function (k) {
      var personKey = PERSON + ':' + k;
      if (oGet.call(localStorage, personKey) === null) {
        var legacy = oGet.call(localStorage, k);
        if (legacy !== null) oSet.call(localStorage, personKey, legacy);
      }
    });
  } catch (_) { /* private mode / quota issues — ignore */ }
})();
</script>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>

<script>
const PROJECTS = [
  {
    id: 1, num: "01", tier: 1, cat: "foundations",
    title: "Autograd Engine",
    sub: "like Micrograd",
    tagline: "Build scalar-valued backpropagation from scratch. Understand how gradients flow through a computational graph. The fundamental primitive everything else is built on.",
    stack: ["Python", "NumPy"],
    time: "1–2 days",
    deps: [],
    guide: {

const TIER_COLORS = { 1: '#f0c040', 2: '#e07020', 3: '#c03050', 4: '#7040e0' };

let activeCat = 'all';
let activeTiers = new Set();
let doneSet = new Set(JSON.parse(localStorage.getItem('byodone') || '[]'));

function renderCards() {
  const grid = document.getElementById('grid');
  grid.querySelectorAll('.project-card').forEach(c => c.remove());

  PROJECTS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card' + (doneSet.has(p.id) ? ' done' : '');
    card.dataset.id = p.id;
    card.dataset.cat = p.cat;
    card.dataset.tier = p.tier;
    card.style.borderLeftColor = TIER_COLORS[p.tier];

    card.innerHTML = `
      <div class="card-meta">
        <span class="card-num">#${p.num}</span>
        <div class="card-badges">
          <span class="badge tier-badge-${p.tier}">T${p.tier}</span>
          <span class="badge cat-badge" style="background:${CAT_COLORS[p.cat]}22;color:${CAT_COLORS[p.cat]};border:1px solid ${CAT_COLORS[p.cat]}44">${p.cat.toUpperCase()}</span>
        </div>
      </div>
      <div class="card-title">${p.title} <span style="font-weight:400;font-size:0.8rem;color:var(--muted)">${p.sub}</span></div>
      <div class="card-tagline">${p.tagline}</div>
      <div class="card-stack">${p.stack.map(s => `<span class="stack-tag">${s}</span>`).join('')}</div>
      <div class="card-footer">
        <span class="card-time">⏱ ${p.time}</span>
        <span class="card-deps">${p.deps.length ? '← ' + p.deps.join(', ') : ''}</span>
        <button class="done-btn" onclick="toggleDone(event, ${p.id})">${doneSet.has(p.id) ? '✓' : '○'}</button>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (!e.target.classList.contains('done-btn')) openModal(p.id);
    });
    grid.appendChild(card);
  });
  applyFilters();
  updateProgress();
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let visibleCount = 0;

  document.querySelectorAll('.project-card').forEach(card => {
    const p = PROJECTS.find(x => x.id == card.dataset.id);
    const catMatch = activeCat === 'all' || card.dataset.cat === activeCat;
    const tierMatch = activeTiers.size === 0 || activeTiers.has(parseInt(card.dataset.tier));
    const searchMatch = !q || p.title.toLowerCase().includes(q) || p.tagline.toLowerCase().includes(q) || p.stack.some(s => s.toLowerCase().includes(q));

    if (catMatch && tierMatch && searchMatch) {
      card.classList.remove('hidden');
      visibleCount++;
    } else {
      card.classList.add('hidden');
    }
  });

  const empty = document.getElementById('emptyState');
  empty.style.display = visibleCount === 0 ? 'block' : 'none';
}

function setCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function toggleTier(tier, btn) {
  if (activeTiers.has(tier)) {
    activeTiers.delete(tier);
    btn.classList.remove('active');
  } else {
    activeTiers.add(tier);
    btn.classList.add('active');
  }
  applyFilters();
}

function toggleDone(e, id) {
  e.stopPropagation();
  if (doneSet.has(id)) doneSet.delete(id);
  else doneSet.add(id);
  localStorage.setItem('byodone', JSON.stringify([...doneSet]));
  const card = document.querySelector(`.project-card[data-id="${id}"]`);
  card.classList.toggle('done');
  card.querySelector('.done-btn').textContent = doneSet.has(id) ? '✓' : '○';
  updateProgress();
}

function updateProgress() {
  const pct = (doneSet.size / 51) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('doneCount').textContent = doneSet.size;
  document.getElementById('countLabel').textContent = `${doneSet.size} / 51 DONE`;
}

function openModal(id) {
  const p = PROJECTS.find(x => x.id === id);
  const g = p.guide;

  document.getElementById('modalTitle').textContent = p.title + ' — ' + p.sub;
  document.getElementById('modalBadges').innerHTML = `
    <span class="badge tier-badge-${p.tier}">TIER ${p.tier}</span>
    <span class="badge cat-badge" style="background:${CAT_COLORS[p.cat]}22;color:${CAT_COLORS[p.cat]};border:1px solid ${CAT_COLORS[p.cat]}44">${p.cat.toUpperCase()}</span>
    <span class="badge" style="background:rgba(255,255,255,0.05);color:var(--muted)">${g.lang}</span>
    <span class="badge" style="background:rgba(255,255,255,0.05);color:var(--muted)">${g.hours}</span>
  `;

  const diffBars = Array.from({length: 5}, (_, i) =>
    `<div class="diff-seg ${i < g.difficulty ? 'filled' : ''}"></div>`
  ).join('');

  document.getElementById('modalBody').innerHTML = `
    <div>
      <div class="modal-section-title">Overview</div>
      <p style="font-size:0.82rem;color:var(--muted);line-height:1.7">${g.overview}</p>
    </div>

    <div class="info-grid">
      <div class="info-box">
        <div class="info-label">Time Estimate</div>
        <div class="info-val">${g.hours}</div>
      </div>
      <div class="info-box">
        <div class="info-label">Difficulty</div>
        <div class="info-val" style="display:flex;align-items:center;gap:6px">${diffBars} <span style="font-size:0.7rem;color:var(--muted)">${g.difficulty}/5</span></div>
      </div>
      <div class="info-box">
        <div class="info-label">Language</div>
        <div class="info-val">${g.lang}</div>
      </div>
      <div class="info-box">
        <div class="info-label">Prerequisites</div>
        <div class="info-val" style="font-size:0.7rem;font-weight:400;line-height:1.4">${p.deps.length ? p.deps.join(', ') : 'None'}</div>
      </div>
    </div>

    <div>
      <div class="modal-section-title">Implementation Steps</div>
      ${g.steps.map(s => `
        <div class="guide-step">
          <div class="step-num">${s.n}</div>
          <div class="step-content">
            <div class="step-title">${s.title}</div>
            <div class="step-desc">${s.desc}</div>
            ${s.code ? `<div class="step-code">${escapeHtml(s.code)}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>

    <div>
      <div class="modal-section-title">Resources</div>
      <div class="resource-list">
        ${g.resources.map(r => `
          <div class="resource-item">
            <span class="resource-type rtype-${r.type}">${r.type}</span>
            <div class="resource-text">
              <div class="resource-name">${r.name}</div>
              <div class="resource-detail">${r.detail}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div style="padding-top:8px;display:flex;gap:12px">
      <button class="btn btn-primary" style="font-family:var(--mono);font-size:0.65rem;padding:10px 20px;cursor:pointer" onclick="toggleDoneFromModal(${p.id})">
        ${doneSet.has(p.id) ? '✓ Mark Incomplete' : '○ Mark Complete'}
      </button>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function toggleDoneFromModal(id) {
  if (doneSet.has(id)) doneSet.delete(id);
  else doneSet.add(id);
  localStorage.setItem('byodone', JSON.stringify([...doneSet]));
  const card = document.querySelector(`.project-card[data-id="${id}"]`);
  if (card) {
    card.classList.toggle('done');
    card.querySelector('.done-btn').textContent = doneSet.has(id) ? '✓' : '○';
  }
  updateProgress();
  openModal(id); // refresh modal button
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function initLocalStorage() {
  try { return true; } catch { return false; }
}

// Make localStorage work in this context
const localStorageMock = { data: {} };
try {
  localStorage.getItem('test');
} catch(e) {
  window.localStorage = {
    getItem: k => localStorageMock.data[k] || null,
    setItem: (k, v) => { localStorageMock.data[k] = v; }
  };
}

renderCards();
</script>
</body>
</html>
