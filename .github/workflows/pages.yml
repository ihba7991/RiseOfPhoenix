name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site

          # Dashboard + assets
          cp -R docs/. _site/

          # Mirror each person's folder so the dashboard's relative links resolve
          for p in phoenix-a phoenix-b; do
            if [ -d "$p" ]; then
              mkdir -p "_site/$p"
              cp -R "$p/." "_site/$p/"
            fi
          done

          echo "Built site:"
          find _site -maxdepth 3 -type f | sort

      - name: Snapshot recent commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Fetch the last 30 commits; works for private repos via GITHUB_TOKEN.
          gh api "repos/${{ github.repository }}/commits?per_page=30" > _site/commits.json
          echo "snapshot $(jq 'length' _site/commits.json) commits"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
